# candidate.schema.yaml — Profile format (documentation, not an executable validator)
#
# This file describes the FORMAT of the data in profile/candidate.yaml.
# It is not a behavior rule (that lives in rules/) — it's just the shape
# any dev's data should follow. scripts/validate_profile.py uses this as a
# human reference; the actual validation is plain Python code (no JSON
# Schema library, to avoid adding a dependency).
#
# Convention: fields marked "(optional)" can be omitted or left empty
# ([]/""). Everything else is required for the pipeline to work.

profile_version: "string — schema version, e.g. '1.1'"
last_updated: "string — YYYY-MM-DD date of the last candidate.yaml edit"

# LOCKED in the final CV — never rewrite, paraphrase, or summarize.
personal:
  name: "string"
  email: "string"
  phone: "string"
  location: "string — city, state, country"
  linkedin: "string — url or handle"
  github: "string — url or handle"
  portfolio: "string (optional)"

# Free-form label, no fixed vocabulary — used only as context for the
# agent, never as a rigid filter. Examples: backend, frontend, fullstack,
# mobile, iot, data, devops, qa, ml. Can be more than one, comma-separated.
track: "string"

# LOCKED — copy exactly as it appears on the CV, never rephrase.
education:
  - institution: "string"
    course: "string"
    degree: "string"
    status: "string — in progress | completed | on hold"
    start: "string — year or date"
    end: "string — year, date, or 'in progress'"
    description: "string (optional) — e.g. courses in a technical program"

# LOCKED — copy exactly.
languages:
  - language: "string"
    level: "string"
    institution: "string (optional)"
    description: "string (optional)"

# Free-form categories (the dev chooses the keys: backend, frontend,
# mobile, database, devops, embedded, data, etc.) — the engine never
# assumes a fixed list of categories.
skills:
  <free_category>:
    - name: "string"
      level: "string — basic | intermediate | advanced"
      years: "number"

# Professional experience. One item per job.
professional_experience:
  - company: "string"
    role: "string"
    period: "string — e.g. 'Nov 2021 – Feb 2026'"
    duration_note: "string (optional) — e.g. '4+ years — never round beyond 1 year'"
    location: "string"
    # (optional) for those who worked on multiple projects/clients within
    # the same job (common in consulting/agencies) — each with its own stack
    projects:
      - id: "string — short identifier, e.g. 'A'"
        name: "string"
        stack: ["string", "..."]
    responsibilities: ["string", "..."] # candidate bullets, the engine picks by overlap with the job
    highlights: ["string", "..."] # (optional)

# Personal/open-source projects.
personal_projects:
  - id: "string"
    name: "string"
    description: "string"
    stack: ["string", "..."]
    link: "string (optional) — omit if the repo isn't confirmed, never invent a slug"
    include_only_if: "string (optional) — textual condition, e.g. 'job mentions Ruby'"
    highlights: ["string", "..."] # (optional)

# (optional) Always distinguish a course from a real certification — never inflate.
certifications:
  - name: "string"
    issuer: "string"
    type: "string — certification | course"
    note: "string (optional) — e.g. 'a course, not a professional certification'"

# Always bilingual. Recommended exactly 6 (CV rule lives in rules/cv-rules.md).
soft_skills:
  - pt: "string"
    en: "string"

preferences:
  job_types: ["string", "..."] # e.g. full-time, contractor
  work_modes: ["string", "..."] # e.g. remote, hybrid, on-site
  salary_range: # (optional)
    min: "number"
    max: "number"
    currency: "string"
  target_roles: ["string", "..."]
  target_industries: ["string", "..."]
  # Hard exclusions — a job matching one of these never enters the /daily
  # table, regardless of score. See rules/job-evaluation.md.
  deal_breakers: ["string", "..."]
  # (optional) target level per stack, for devs with a primary vs. secondary
  # stack with different seniority expectations. Free format: {stack: target_level}
  seniority_by_stack:
    <free_stack>: "string"
  avoid_industries: ["string", "..."] # (optional)
  # (optional) Company-level hard exclusion — filtered out before fit score
  # is even calculated, no job description read. Different from
  # deal_breakers (which is about job content, not the company itself).
  # Use for recruiters/companies the dev has personally decided to avoid
  # (e.g. suspicious volume of near-identical postings, bad reputation).
  blocked_companies: ["string", "..."]

# Where confirmed applications get registered. Never hardcoded in the
# engine — see rules/README.md and workflows/confirm.md.
tracker:
  backend: "string — csv | notion | none"
  notion: # only fill in if backend == notion (personal config, not the engine's)
    database_id: "string"
    data_source_id: "string"
    stack_tags: ["string", "..."] # free vocabulary owned by that Notion workspace
    gap_tags: ["string", "..."]
  csv: # recommended default backend — zero external dependency
    path: "string — e.g. 'documents/applications.csv'"
